name: Build Hermes Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Node.js for frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install frontend dependencies
      - name: Install frontend deps
        run: npm ci

      # Download bundled Hermes Agent runtime resources (with retries)
      - name: Download Hermes Agent runtime
        run: |
          if [ -f src-tauri/hermes-agent.zip ]; then
            echo "hermes-agent.zip already exists in checkout, skipping download"
          else
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              curl -L --connect-timeout 30 --max-time 120 \
                -o src-tauri/hermes-agent.zip \
                http://175.27.242.158:5000/download/hermes-agent.zip && break
              sleep 10
            done
            if [ ! -f src-tauri/hermes-agent.zip ]; then
              echo "Failed to download hermes-agent.zip after 3 attempts"
              exit 1
            fi
          fi
        shell: bash

      # Build Web UI from hermes-agent source (output goes to hermes_cli/web_dist/)
      - name: Build Web UI
        shell: bash
        run: |
          mkdir -p /tmp/hermes-web
          cd /tmp/hermes-web
          unzip -o "$GITHUB_WORKSPACE/src-tauri/hermes-agent.zip"
          cd web
          npm ci
          npm run build
          cd ..
          # Build output is in hermes_cli/web_dist/ (per vite.config.ts)
          # The Rust launch_dashboard looks for web_dist/ at zip root, so:
          mv hermes_cli/web_dist web_dist
          # Re-zip with web_dist included
          zip -r "$GITHUB_WORKSPACE/src-tauri/hermes-agent.zip" web_dist
          rm -rf /tmp/hermes-web
        env:
          CI: true

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Install Tauri CLI
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build (Tauri handles both frontend + backend)
      - name: Build Tauri app
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Upload artifact
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # Upload portable (if available)
      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Portable
          path: src-tauri/target/release/hermes-windows.exe
          if-no-files-found: warn

  # Build on macOS to verify it compiles
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      # Download bundled Hermes Agent runtime resources (with retries)
      - name: Download Hermes Agent runtime
        run: |
          if [ -f src-tauri/hermes-agent.zip ]; then
            echo "hermes-agent.zip already exists in checkout, skipping download"
          else
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              curl -L --connect-timeout 30 --max-time 120 \
                -o src-tauri/hermes-agent.zip \
                http://175.27.242.158:5000/download/hermes-agent.zip && break
              sleep 10
            done
            if [ ! -f src-tauri/hermes-agent.zip ]; then
              echo "Failed to download hermes-agent.zip after 3 attempts"
              exit 1
            fi
          fi
        shell: bash

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build macOS app
        run: cargo tauri build --bundles dmg
