name: Build Hermes Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 允许创建 Release

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Node.js for frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install frontend dependencies
      - name: Install frontend deps
        run: npm ci

      # Clone original Hermes Agent from GitHub (完整原版)
      - name: Clone Hermes Agent runtime
        shell: pwsh
        run: |
          # Clone original NousResearch/hermes-agent
          echo "Cloning original hermes-agent from GitHub..."
          $agentSrc = "$env:TEMP\hermes-agent"
          if (Test-Path $agentSrc) { Remove-Item $agentSrc -Recurse -Force }
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git $agentSrc 2>&1 | Out-Null

          if (-not (Test-Path "$agentSrc\agent\__init__.py")) {
            Write-Output "ERROR: agent package not found in cloned hermes-agent"
            exit 1
          }

          # Build dashboard web_dist from hermes-agent
          echo "Building dashboard..."
          Push-Location "$agentSrc\web"
          npm ci
          npm run build
          Pop-Location

          if (Test-Path "$agentSrc\web\dist") {
            Move-Item "$agentSrc\web\dist" "$agentSrc\web_dist" -Force
          } elseif (Test-Path "$agentSrc\web\build") {
            Move-Item "$agentSrc\web\build" "$agentSrc\web_dist" -Force
          }
          echo "Dashboard built"

          # Clone hermes-workspace (AI chat interface)
          echo "Cloning hermes-workspace..."
          $wsDir = "$env:TEMP\hermes-workspace"
          if (Test-Path $wsDir) { Remove-Item $wsDir -Recurse -Force }
          git clone --depth 1 https://github.com/nesquena/hermes-webui.git $wsDir 2>&1 | Out-Null

          if (-not (Test-Path "$wsDir\bootstrap.py")) {
            Write-Output "ERROR: bootstrap.py not found in hermes-workspace"
            exit 1
          }

          # Build hermes-workspace web (vanilla JS, no build needed but verify structure)
          if (Test-Path "$wsDir\web\package.json") {
            Push-Location "$wsDir\web"
            npm ci
            npm run build
            Pop-Location
            if (Test-Path "$wsDir\web\dist") {
              Move-Item "$wsDir\web\dist" "$wsDir\web_dist" -Force
            } elseif (Test-Path "$wsDir\web\build") {
              Move-Item "$wsDir\web\build" "$wsDir\web_dist" -Force
            }
            echo "Hermes-workspace built"
          }

          # Put hermes-workspace as SIBLING of hermes-agent inside the final bundle dir
          # Final structure: hermes-final/hermes-agent/ + hermes-final/hermes-workspace/
          New-Item -ItemType Directory -Force "$env:TEMP\hermes-final" | Out-Null
          Move-Item $agentSrc "$env:TEMP\hermes-final\hermes-agent" -Force
          Move-Item $wsDir "$env:TEMP\hermes-final\hermes-workspace" -Force

          # Repackage hermes-agent.zip
          echo "Repackaging hermes-agent.zip..."
          if (Test-Path "src-tauri\hermes-agent.zip") { Remove-Item "src-tauri\hermes-agent.zip" -Force }
          Compress-Archive -Path "$env:TEMP\hermes-final\*" -DestinationPath "src-tauri\hermes-agent.zip" -Force
          Write-Output "Package ready: $([math]::Round((Get-Item src-tauri\hermes-agent.zip).Length/1MB,1)) MB"

          # Overwrite resources zip so Tauri bundles the newly built zip
          Copy-Item "src-tauri\hermes-agent.zip" "src-tauri\resources\hermes-agent.zip" -Force
          Write-Host "Updated resources/hermes-agent.zip"

          # Cleanup
          Remove-Item "$env:TEMP\hermes-final" -Recurse -Force -EA SilentlyContinue
          echo "Done"

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Install Tauri CLI
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build (Tauri handles both frontend + backend)
      - name: Build Tauri app
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 生成 update.json（用于自动更新）
      - name: Generate update.json
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $exeFile = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Select-Object -First 1
          $sigFile = "$($exeFile.FullName).sig"
          $signature = ""
          if (Test-Path $sigFile) {
            $signature = [System.Convert]::ToBase64String([System.IO.File]::ReadAllBytes($sigFile))
          }
          $releaseTag = "v$version"
          $updateJson = @{
            version = $version
            notes = "Hermes Agent v$version 发布"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/5bqp2tjdnc-prog/hermes-windows/releases/download/$releaseTag/$($exeFile.Name)"
              }
            }
          }
          $updateJson | ConvertTo-Json -Compress | Set-Content -Path "update.json"
          Write-Output "update.json generated for v$version"

      # 上传构建产物（普通 push 时）
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Portable
          path: src-tauri/target/release/hermes-windows.exe
          if-no-files-found: warn

      # 上传 update.json
      - name: Upload update.json
        uses: actions/upload-artifact@v4
        with:
          name: update-json
          path: update.json
          if-no-files-found: warn

      # 如果是 tag 推送，创建 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Hermes Agent ${{ github.ref_name }}
          body: |
            ## Hermes Agent ${{ github.ref_name }}

            ### 更新内容
            请查看 [CHANGELOG](./CHANGELOG.md) 了解详情。

            ### 安装
            下载 `*_x64-setup.exe` 安装程序，双击运行即可。
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/hermes-windows.exe
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build on macOS to verify it compiles
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      # macOS compile check: download raw hermes-agent.zip (no repackaging needed)
      - name: Download Hermes Agent runtime
        run: |
          if [ -f src-tauri/hermes-agent.zip ]; then
            echo "hermes-agent.zip already exists in checkout"
          else
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              curl -L --connect-timeout 30 --max-time 120 \
                -o src-tauri/hermes-agent.zip \
                http://175.27.242.158:5000/download/hermes-agent.zip && break
              sleep 10
            done
          fi
        shell: bash

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build macOS app
        run: cargo tauri build --bundles dmg
