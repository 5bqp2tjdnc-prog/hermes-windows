name: Build Hermes Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 允许创建 Release

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Node.js for frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install frontend dependencies
      - name: Install frontend deps
        run: npm ci

      # Download bundled Hermes Agent runtime resources (with retries)
      - name: Download Hermes Agent runtime
        run: |
          if [ -f src-tauri/hermes-agent.zip ]; then
            echo "hermes-agent.zip already exists in checkout, skipping download"
          else
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              curl -L --connect-timeout 30 --max-time 120 \
                -o src-tauri/hermes-agent.zip \
                http://175.27.242.158:5000/download/hermes-agent.zip && break
              sleep 10
            done
            if [ ! -f src-tauri/hermes-agent.zip ]; then
              echo "Failed to download hermes-agent.zip after 3 attempts"
              exit 1
            fi
          fi
        shell: bash

      # Clone hermes-workspace and combine with hermes-agent (sibling layout)
      # bootstrap.py needs hermes-agent and hermes-workspace as sibling dirs
      - name: Package Hermes workspace
        shell: pwsh
        run: |
          $zipPath = "$env:GITHUB_WORKSPACE\src-tauri\hermes-agent.zip"
          $tempDir = "$env:TEMP\hermes-package"

          # 1. 创建根目录
          if (-not (Test-Path "$tempDir")) { New-Item -ItemType Directory -Force -Path "$tempDir" | Out-Null }

          # 2. 解压 hermes-agent
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          [System.IO.Compression.ZipFileExtensions]::ExtractToDirectory($zip, $tempDir)
          $zip.Dispose()
          $agentDir = "$tempDir\hermes-agent"
          Write-Output "hermes-agent extracted to $agentDir"

          # 3. 构建管理后台 React 前端（web_dist/）
          Write-Output "Building dashboard web UI..."
          Push-Location "$agentDir\web"
          npm ci
          npm run build
          Pop-Location
          # hermes_cli.main dashboard 从 web_dist/ 读取静态文件
          Move-Item "$agentDir\web\dist" "$agentDir\web_dist" -Force
          Write-Output "Dashboard built"

          # 4. 克隆 hermes-workspace
          $wsDir = "$tempDir\hermes-workspace"
          if (-not (Test-Path $wsDir)) {
            git clone --depth 1 https://github.com/nesquena/hermes-webui.git $wsDir
            Write-Output "hermes-workspace cloned"
          }

          # 5. 验证同级目录结构
          Write-Output "Contents: $(Get-ChildItem $tempDir -Name -Directory)"
          $expected = @("hermes-agent", "hermes-workspace")
          foreach ($d in $expected) {
            if (-not (Test-Path "$tempDir\$d")) {
              Write-Output "ERROR: Missing $d in $tempDir"
              exit 1
            }
          }
          Write-Output "Sibling structure verified"

          # 6. 打包成新的 hermes-agent.zip
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory($tempDir, $zipPath, 'Optimal')
          Write-Output "Combined zip created: $((Get-Item $zipPath).Length / 1MB) MB"

          # 清理
          Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue
          Write-Output "Packaging complete"

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Install Tauri CLI
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build (Tauri handles both frontend + backend)
      - name: Build Tauri app
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 生成 update.json（用于自动更新）
      - name: Generate update.json
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $exeFile = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Select-Object -First 1
          $sigFile = "$($exeFile.FullName).sig"
          $signature = ""
          if (Test-Path $sigFile) {
            $signature = [System.Convert]::ToBase64String([System.IO.File]::ReadAllBytes($sigFile))
          }
          $releaseTag = "v$version"
          $updateJson = @{
            version = $version
            notes = "Hermes Agent v$version 发布"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/5bqp2tjdnc-prog/hermes-windows/releases/download/$releaseTag/$($exeFile.Name)"
              }
            }
          }
          $updateJson | ConvertTo-Json -Compress | Set-Content -Path "update.json"
          Write-Output "update.json generated for v$version"

      # 上传构建产物（普通 push 时）
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-Portable
          path: src-tauri/target/release/hermes-windows.exe
          if-no-files-found: warn

      # 上传 update.json
      - name: Upload update.json
        uses: actions/upload-artifact@v4
        with:
          name: update-json
          path: update.json
          if-no-files-found: warn

      # 如果是 tag 推送，创建 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Hermes Agent ${{ github.ref_name }}
          body: |
            ## Hermes Agent ${{ github.ref_name }}

            ### 更新内容
            请查看 [CHANGELOG](./CHANGELOG.md) 了解详情。

            ### 安装
            下载 `*_x64-setup.exe` 安装程序，双击运行即可。
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/hermes-windows.exe
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build on macOS to verify it compiles
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      - name: Download Hermes Agent runtime
        run: |
          if [ -f src-tauri/hermes-agent.zip ]; then
            echo "hermes-agent.zip already exists in checkout, skipping download"
          else
            for i in 1 2 3; do
              echo "Download attempt $i/3..."
              curl -L --connect-timeout 30 --max-time 120 \
                -o src-tauri/hermes-agent.zip \
                http://175.27.242.158:5000/download/hermes-agent.zip && break
              sleep 10
            done
            if [ ! -f src-tauri/hermes-agent.zip ]; then
              echo "Failed to download hermes-agent.zip after 3 attempts"
              exit 1
            fi
          fi
        shell: bash

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build macOS app
        run: cargo tauri build --bundles dmg
